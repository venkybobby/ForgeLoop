# ===========================================================================
# ForgeLoop — local self-hosted stack.
#
# This compose file wires the subsystems together for local development.
# The `forge` and `loopy` code is committed in-tree, so no vendoring step is
# needed. Forge runs as a single pure-Python service (server + auto-distill);
# there is no Dockerfile yet, so the services below are commented out and will
# be enabled as each Dockerfile lands during Inner Loop 1 — see
# docs/loop-engineering.md.
# ===========================================================================
