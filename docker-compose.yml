# ===========================================================================
# ForgeLoop — local self-hosted stack.
#
# This compose file wires the subsystems together for local development.
# The `forge` and `loopy` code is committed in-tree, so no vendoring step is
# needed. Forge runs as a single pure-Python service (server + auto-distill);
# there is no Dockerfile yet, so the services below are commented out and will
# be enabled as each Dockerfile lands during Inner Loop 1 — see
# docs/loop-engineering.md.
# ===========================================================================
version: "3.9"

services:
  # --- ForgeLoop web app: the browser control plane (catalog, runs, approvals) ---
  # One command to deploy: `docker compose up forgeloop-web`, then open
  # http://localhost:8055/. Includes Playwright + Chromium for live runs.
  forgeloop-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_PORT:-8055}:8055"
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8055"
      # Auth (see docs/auth.md). Precedence: OAuth > dev-login > token > open.
      FORGELOOP_TOKEN: ${FORGELOOP_TOKEN:-}              # shared-token gate (solo)
      # GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}     # multi-user OAuth
      # GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      # FORGELOOP_BASE_URL: ${FORGELOOP_BASE_URL:-}            # e.g. https://host
      # FORGELOOP_SESSION_SECRET: ${FORGELOOP_SESSION_SECRET:-} # keep sessions across restarts
      FORGELOOP_RATE_PER_MIN: ${FORGELOOP_RATE_PER_MIN:-30}
      # For LLM-driven (agentic) runs, pass your key through:
      # SF_LLM_KEY: ${SF_LLM_KEY:-}
      # SF_LLM_BASE: ${SF_LLM_BASE:-https://api.anthropic.com}
    volumes:
      - ./.data:/app/.data        # audit trail + run records persist here
    restart: unless-stopped

  # --- Forge: FastAPI ingestion server + control panel + auto-distill ---
  # Pure Python; serves the panel on 8099 and (with JFL_AUTODISTILL=1) distills
  # recordings into SKILL.md under forge/data/harness/skills/.
  # forge:
  #   build:
  #     context: ./forge          # TODO: add forge/Dockerfile (python + requirements.txt)
  #   command: python server/server.py
  #   env_file: ./forge/.env.local
  #   ports:
  #     - "${FORGE_SERVER_PORT:-8099}:8099"
  #   volumes:
  #     - ./forge/data:/app/data
  #   restart: unless-stopped

