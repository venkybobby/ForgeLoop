# CI: build downloadable Mac apps.
#  - build-app         (Linux runner)  → wrapper .app (needs Python on the Mac)
#  - build-native-mac  (macOS runner)  → real native Tauri .app (self-contained)
#  - release           (on git tag)    → publishes both to the Releases page

stages: [build, release]

# ── Wrapper .app: pure-file, builds on any Linux runner ───────────────────────
build-app:
  stage: build
  image: node:20-bookworm-slim
  variables:
    GIT_STRATEGY: clone          # avoid a stale nested out/ tripping git clean
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    PNPM_STORE: "$CI_PROJECT_DIR/.pnpm-store"
  cache:
    key: pnpm-${CI_COMMIT_REF_SLUG}
    paths: [".npm/", ".pnpm-store/", "extension/node_modules/"]
  script:
    - node -v
    - cd extension
    - npx --yes pnpm@9 config set store-dir "$PNPM_STORE"
    - npx --yes pnpm@9 install --no-frozen-lockfile
    - npx --yes pnpm@9 run build
    - cd ..
    - bash packaging/build-mac-app.sh "$CI_PROJECT_DIR/out"
    - ls -lh out/JourneyForgeLocal-mac.zip
  artifacts:
    name: "JourneyForgeLocal-wrapper-$CI_COMMIT_SHORT_SHA"
    paths: ["out/JourneyForgeLocal-mac.zip"]
    expire_in: 12 weeks
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ── Native .app: needs a macOS runner tagged "macos" (shell executor) ─────────
# Host must have: Xcode CLT, rustup, Node 20+, pnpm/corepack, python3.
build-native-mac:
  stage: build
  tags: [macos]
  variables:
    GIT_CLEAN_FLAGS: "-ffd"      # keep ignored caches (rust target, node_modules) across runs
  script:
    # Bootstrap toolchain if the shared runner lacks it (Rust; pnpm via npx).
    - 'command -v cargo >/dev/null 2>&1 || curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
    - export PATH="$HOME/.cargo/bin:$PATH"
    - cargo --version; node -v; python3 --version
    - bash packaging/build-native-mac.sh
    - mkdir -p out
    - cp "desktop/src-tauri/target/release/bundle/macos/JourneyForgeLocal-native-mac.dmg" out/
    - ls -lh out/JourneyForgeLocal-native-mac.dmg
  artifacts:
    name: "JourneyForgeLocal-native-$CI_COMMIT_SHORT_SHA"
    paths: ["out/JourneyForgeLocal-native-mac.dmg"]
    expire_in: 12 weeks
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ── Release: on a git tag, list both builds on the Releases page ──────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-app
      artifacts: false
    - job: build-native-mac
      artifacts: false
      optional: true
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Journey Forge Local $CI_COMMIT_TAG"
    description: "Automated build. Download the macOS app below."
    assets:
      links:
        - name: "Native macOS app (self-contained .dmg) — JourneyForgeLocal-native-mac.dmg"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/out/JourneyForgeLocal-native-mac.dmg?job=build-native-mac"
        - name: "Wrapper .app (needs Python on the Mac) — JourneyForgeLocal-mac.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/out/JourneyForgeLocal-mac.zip?job=build-app"
